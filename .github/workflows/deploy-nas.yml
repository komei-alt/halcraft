name: Deploy to NAS

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'DOCUMENT/**'
      - 'PLAN/**'
      - '.agent/**'
      - '.claude/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-nas
  cancel-in-progress: true

jobs:
  deploy:
    uses: komei-alt/ROSCH_Actions/.github/workflows/shared-nas-deploy.yml@main
    with:
      deploy_dir: '/volume1/docker/halcraft-repo'
      compose_dir: '/volume1/docker/halcraft-repo'
      container_name: 'halcraft'
      deploy_delay: ${{ github.event_name == 'push' && 180 || 0 }}
      preserve_files: ""
