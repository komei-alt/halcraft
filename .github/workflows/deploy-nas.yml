name: "[DEPRECATED] Deploy to NAS"

# NAS Deploy Engine (/opt/nas-deploy/) に移行済み。
# 通常のデプロイは git push → NAS bare repo → nas-deploy.sh で実行。

on:
  workflow_dispatch:

concurrency:
  group: deploy-halcraft
  cancel-in-progress: true

jobs:
  deploy:
    uses: komei-alt/ROSCH_Actions/.github/workflows/shared-nas-deploy.yml@main
    with:
      deploy_dir: '/volume1/docker/halcraft-repo'
      compose_dir: '/volume1/docker/halcraft-repo'
      container_name: 'halcraft'
      deploy_delay: ${{ github.event_name == 'push' && 180 || 0 }}
      preserve_files: ""
