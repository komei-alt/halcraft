# ============================================
# ハルクラ (HalCraft) - Docker Compose
# ============================================
#
# Synology NAS 上で稼働。
# Cloudflare Tunnel 経由で halcraft.rosch.jp から公開。
#
# 構成:
#   - halcraft: ゲーム本体（Nginx）
#   - deploy-webhook: GitHub push → 自動デプロイ
#
# 使い方:
#   起動:         sudo docker compose up -d
#   再ビルド:     sudo docker compose up -d --build
#   ログ確認:     sudo docker compose logs -f
#   停止:         sudo docker compose down

services:
  halcraft:
    build:
      context: ./halcraft
      dockerfile: Dockerfile
    image: halcraft:latest
    container_name: halcraft
    restart: always
    ports:
      - "4000:80"
    networks:
      - halcraft-net

  halcraft-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: halcraft-server:latest
    container_name: halcraft-server
    restart: always
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - RSDM_PROJECT=halcraft
      - RSDM_HUB_URL=${RSDM_HUB_URL:-http://192.168.100.100:3102}
      - RSDM_HUB_API_KEY=${RSDM_HUB_API_KEY:-}
    volumes:
      - halcraft-server-data:/app/data
    networks:
      - halcraft-net



networks:
  halcraft-net:
    driver: bridge

volumes:
  halcraft-server-data:
